<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>进度条调试</title>
    <style>
        body { 
            background: #f0f0f0; 
            font-family: Arial; 
            padding: 20px;
            margin: 0;
        }
        
        .debug-panel {
            background: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        
        .debug-info {
            background: #f8f9fa;
            padding: 10px;
            border-radius: 4px;
            margin-top: 10px;
            font-family: monospace;
            font-size: 12px;
            border-left: 4px solid #007bff;
        }
        
        .controls {
            margin-top: 10px;
            display: flex;
            gap: 10px;
        }
        
        .btn {
            padding: 8px 16px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }
        
        .btn:hover {
            background: #0056b3;
        }
        
        .status {
            margin-top: 10px;
            padding: 8px;
            border-radius: 4px;
            font-weight: bold;
        }
        
        .status.success { background: #d4edda; color: #155724; }
        .status.error { background: #f8d7da; color: #721c24; }
        .status.warning { background: #fff3cd; color: #856404; }
    </style>
    <link rel="stylesheet" href="music.css">
</head>
<body>
    <div class="debug-panel">
        <h2>🎵 进度条功能调试</h2>
        
        <div class="controls">
            <button class="btn" onclick="testPlay()">播放测试</button>
            <button class="btn" onclick="testPause()">暂停测试</button>
            <button class="btn" onclick="testSeek(10)">跳转到10秒</button>
            <button class="btn" onclick="testSeek(30)">跳转到30秒</button>
            <button class="btn" onclick="refreshDebugInfo()">刷新信息</button>
        </div>
        
        <div id="statusMessage" class="status"></div>
        
        <div id="debugInfo" class="debug-info">初始化中...</div>
    </div>

    <h3>播放器：</h3>
    <div class="netease-mini-player"
        data-music-file="audio/岸边客 (心碎版0.9x)-夏子航（2603）.mp3"
        data-lyric-file="audio/岸边客 (心碎版0.9x)-夏子航（2603）.lrc"
        data-autoplay="false"
        data-position="static"
        data-theme="auto"
        data-size="normal">
    </div>

    <script src="music.js"></script>
    
    <script>
        let player = null;
        let debugInterval = null;
        
        function showStatus(message, type = 'success') {
            const statusDiv = document.getElementById('statusMessage');
            statusDiv.textContent = message;
            statusDiv.className = `status ${type}`;
            
            // 3秒后自动清除
            setTimeout(() => {
                statusDiv.textContent = '';
                statusDiv.className = 'status';
            }, 3000);
        }
        
        function updateDebugInfo() {
            if (!player) {
                document.getElementById('debugInfo').innerHTML = '播放器未初始化';
                return;
            }
            
            const audio = player.audio;
            const elements = player.elements;
            
            const info = `
📊 播放状态: ${player.isPlaying ? '▶️ 播放中' : '⏸️ 暂停'}
⏱️ 当前时间: ${player.currentTime.toFixed(2)}s (${formatTime(player.currentTime)})
⏱️ 总时长: ${player.duration.toFixed(2)}s (${formatTime(player.duration)})
📈 进度百分比: ${player.duration > 0 ? ((player.currentTime / player.duration) * 100).toFixed(1) : 0}%
🎵 音频元素: ${audio ? '✅ 已加载' : '❌ 未加载'}
📊 进度条元素: ${elements.progressBar ? '✅ 已找到' : '❌ 未找到'}
📊 进度条容器: ${elements.progressContainer ? '✅ 已找到' : '❌ 未找到'}
🎯 音频源: ${audio.src ? audio.src.substring(0, 60) + '...' : '无'}
📊 音频就绪状态: ${audio ? audio.readyState + '/4' : 'N/A'} (readyState)
🌐 音频网络状态: ${audio ? audio.networkState : 'N/A'}
🔊 音量: ${player.volume ? (player.volume * 100).toFixed(0) + '%' : 'N/A'}
📊 进度条宽度: ${elements.progressBar ? elements.progressBar.style.width : 'N/A'}
🎵 当前歌曲: ${player.currentSong ? player.currentSong.name : 'N/A'}
            `;
            
            document.getElementById('debugInfo').innerHTML = info.replace(/\n/g, '<br>');
        }
        
        function formatTime(seconds) {
            if (!seconds || isNaN(seconds)) return '0:00';
            const minutes = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${minutes}:${secs.toString().padStart(2, '0')}`;
        }
        
        function testPlay() {
            if (!player) {
                showStatus('播放器未初始化', 'error');
                return;
            }
            player.play();
            showStatus('开始播放', 'success');
        }
        
        function testPause() {
            if (!player) {
                showStatus('播放器未初始化', 'error');
                return;
            }
            player.pause();
            showStatus('暂停播放', 'success');
        }
        
        function testSeek(seconds) {
            if (!player || !player.audio) {
                showStatus('播放器未初始化', 'error');
                return;
            }
            
            if (player.duration > 0) {
                player.audio.currentTime = seconds;
                showStatus(`跳转到 ${seconds} 秒`, 'success');
            } else {
                showStatus('音频尚未加载完成', 'warning');
            }
        }
        
        function refreshDebugInfo() {
            updateDebugInfo();
            showStatus('调试信息已刷新', 'success');
        }
        
        // 初始化
        setTimeout(() => {
            const playerElement = document.querySelector('.netease-mini-player');
            if (playerElement && playerElement.neteasePlayer) {
                player = playerElement.neteasePlayer;
                
                // 监听关键事件
                player.audio.addEventListener('loadedmetadata', () => {
                    console.log('✅ 音频元数据已加载');
                    updateDebugInfo();
                    showStatus('音频加载完成', 'success');
                });
                
                player.audio.addEventListener('timeupdate', () => {
                    // 每5次timeupdate更新一次调试信息，避免过于频繁
                    if (Math.floor(player.currentTime) % 5 === 0) {
                        updateDebugInfo();
                    }
                });
                
                player.audio.addEventListener('canplay', () => {
                    console.log('✅ 音频可以播放');
                    updateDebugInfo();
                });
                
                player.audio.addEventListener('error', (e) => {
                    console.error('❌ 音频错误:', e);
                    updateDebugInfo();
                    showStatus('音频加载错误: ' + (e.target.error?.message || '未知错误'), 'error');
                });
                
                // 初始更新
                updateDebugInfo();
                
                // 每秒更新调试信息
                debugInterval = setInterval(updateDebugInfo, 1000);
                
                showStatus('播放器初始化成功', 'success');
            } else {
                document.getElementById('debugInfo').innerHTML = '❌ 播放器初始化失败';
                showStatus('播放器初始化失败', 'error');
            }
        }, 1500);
        
        // 页面卸载时清理
        window.addEventListener('beforeunload', () => {
            if (debugInterval) {
                clearInterval(debugInterval);
            }
        });
    </script>
</body>
</html>
